<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="description" content="Carrito de compras - Pizza Raúl Delivery">
    <meta name="keywords" content="carrito pizza raul, pedido online">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Carrito - Pizza Raúl Delivery</title>
    <link rel="stylesheet" href="css/style.css">
    <style>
        .cart-item {
            display: flex;
            align-items: center;
            gap: 20px;
            padding: 20px;
            background: white;
            margin-bottom: 15px;
            border-radius: 12px;
            box-shadow: 0 3px 10px rgba(0,0,0,0.08);
        }
        .cart-item img {
            width: 110px;
            height: 110px;
            object-fit: cover;
            border-radius: 8px;
        }
        .cart-item-info {
            flex: 1;
        }
        .cart-item-info h3 {
            margin: 0 0 5px 0;
            color: #333;
        }
        .remove-btn {
            background: #e63939;
            color: white;
            border: none;
            padding: 8px 16px;
            border-radius: 6px;
            cursor: pointer;
        }
        .total {
            font-size: 1.6rem;
            font-weight: bold;
            color: #c8102e;
            text-align: right;
            margin: 30px 0;
        }
    </style>
</head>
<script>
    // Menú Hamburguesa
    const hamburger = document.getElementById('hamburger');
    const navLinks = document.getElementById('navLinks');

    hamburger.addEventListener('click', () => {
        navLinks.classList.toggle('active');
        
        // Cambia el icono entre ☰ y ✕
        if (navLinks.classList.contains('active')) {
            hamburger.textContent = '✕';
        } else {
            hamburger.textContent = '☰';
        }
    });

    // Cierra el menú al hacer clic en un enlace (en móviles)
    document.querySelectorAll('.nav-links a').forEach(link => {
        link.addEventListener('click', () => {
            navLinks.classList.remove('active');
            hamburger.textContent = '☰';
        });
    });
</script>
<body>
    <header>
    <nav>
        <div class="logo">🍕 Pizza Raúl</div>
        
        <!-- Menú normal (computadora) -->
        <ul class="nav-links" id="navLinks">
            <li><a href="index.html">Inicio</a></li>
            <li><a href="menu.html">Menú</a></li>
            <li><a href="blog.html">Blog</a></li>
            <li><a href="landing.html">Promociones</a></li>
            <li><a href="contacto.html">Contacto</a></li>
            <li><a href="carrito.html" class="cart-icon">🛒 <span id="cart-count" class="cart-count">0</span></a></li>
        </ul>

        <!-- Botón Hamburguesa -->
        <button class="hamburger" id="hamburger">☰</button>
    </nav>
</header>

    <section style="padding:60px 0; background:#f9f9f9;">
        <div class="container">
            <h2 style="text-align:center; margin-bottom:40px;">Tu Carrito de Compras</h2>
            
            <div id="cart-items"></div>
            
            <div class="total" id="total"></div>

            <div style="text-align:center; margin-top:40px;">
                <button onclick="finalizarPedido()" 
                        style="padding:18px 60px; background:#c8102e; color:white; border:none; border-radius:50px; font-size:1.2rem; cursor:pointer;">
                    Finalizar Pedido
                </button>
            </div>
        </div>
    </section>

    <script>
        function loadCart() {
            let cart = JSON.parse(localStorage.getItem('cartPizzaRaul')) || [];
            let html = '';
            let total = 0;

            if (cart.length === 0) {
                html = `<p style="text-align:center; font-size:1.4rem; padding:80px 20px; color:#666;">
                            Tu carrito está vacío<br><br>
                            <a href="menu.html" style="color:#c8102e;">Ir al Menú →</a>
                        </p>`;
            } else {
                cart.forEach((item, index) => {
                    total += parseFloat(item.precio);
                    html += `
                        <div class="cart-item">
                            <img src="${item.imagen}" alt="${item.nombre}">
                            <div class="cart-item-info">
                                <h3>${item.nombre}</h3>
                                <p><strong>$${parseFloat(item.precio).toFixed(2)}</strong></p>
                            </div>
                            <button onclick="removeFromCart(${index})" class="remove-btn">Eliminar</button>
                        </div>`;
                });
            }

            document.getElementById('cart-items').innerHTML = html;
            document.getElementById('total').innerHTML = `Total: <strong>$${total.toFixed(2)}</strong>`;
            document.getElementById('cart-count').textContent = cart.length;
        }

        function removeFromCart(index) {
            let cart = JSON.parse(localStorage.getItem('cartPizzaRaul')) || [];
            cart.splice(index, 1);
            localStorage.setItem('cartPizzaRaul', JSON.stringify(cart));
            loadCart();
        }

        function finalizarPedido() {
            let cart = JSON.parse(localStorage.getItem('cartPizzaRaul')) || [];
            if (cart.length === 0) return;
            
            alert("🎉 ¡Pedido realizado con éxito!\n\nGracias por comprar en Pizza Raúl. Tu pedido está en camino.");
            localStorage.removeItem('cartPizzaRaul');
            loadCart();
        }

        // Cargar el carrito al abrir la página
        window.onload = loadCart;
    </script>
</body>
</html>
